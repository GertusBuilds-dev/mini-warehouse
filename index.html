<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mini Warehouse Scanner</title>

    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h2>Mini Warehouse Scanner</h2>
    <div id="version"></div>
    <p>Last Scan:</p>
    <h3 id="result">none</h3>

    <div class="scanner-container">
      <video id="video"></video>

      <div class="overlay">
        <div style="top: 0; left: 0; width: 100%; height: 60px"></div>
        <div style="bottom: 0; left: 0; width: 100%; height: 60px"></div>
        <div style="top: 60px; left: 0; width: 60px; height: 120px"></div>
        <div style="top: 60px; right: 0; width: 60px; height: 120px"></div>
      </div>

      <div class="scan-box"></div>
    </div>

    <div class="controls">
      <label>Qty:</label>
      <input id="qty" type="number" value="1" />

      <br /><br />

      <button onclick="startScan()">Start Scan</button>
      <button onclick="saveScan()">Save</button>
    </div>

    <div id="debug">Debug console</div>
    <button onclick="showReleaseNotes()">Release Notes</button>

    <div
      id="releaseNotes"
      style="
        display: none;
        background: #222;
        color: #0f0;
        padding: 10px;
        margin-top: 10px;
        max-height: 200px;
        overflow: auto;
        font-family: monospace;
      "
    ></div>
    <script src="version.js"></script>
  </body>
</html>
