<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Mini Warehouse Scanner</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }

      video {
        width: 100%;
        max-width: 400px;
        border: 2px solid black;
      }

      button {
        padding: 10px;
        margin-top: 10px;
        font-size: 16px;
      }

      .scanner-container {
        position: relative;
        width: 320px;
        height: 240px;
        margin-top: 20px;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border: 2px solid black;
      }

      .scan-box {
        position: absolute;

        top: 50%;
        left: 50%;

        width: 200px;
        height: 120px;

        transform: translate(-50%, -50%);

        border: 3px solid lime;

        border-radius: 10px;

        box-shadow: 0 0 10px lime;
      }

      .scanner-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
      }

      .scan-box {
        z-index: 2;
        background: transparent;
      }
    </style>
  </head>

  <body>
    <h2>Warehouse Scanner</h2>

    <p>Last Scan:</p>
    <h3 id="result">none</h3>

    <div class="scanner-container">
      <video id="video"></video>

      <div class="scan-box"></div>
    </div>
    <br />
    <input id="qty" type="number" value="1" />
    <br />

    <button onclick="startScan()">Start Scan</button>
    <button onclick="saveScan()">Save</button>

    <div
      id="debug"
      style="
        margin-top: 20px;
        padding: 10px;
        background: #111;
        color: #0f0;
        font-family: monospace;
        height: 150px;
        overflow: auto;
      "
    >
      Debug console
    </div>

    <script src="app.js"></script>
  </body>
</html>
